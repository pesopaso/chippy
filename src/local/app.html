<!DOCTYPE html>
<!-- SPDX-License-Identifier: Apache-2.0 -->
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chippy</title>
  <link rel="icon" type="image/svg+xml" href="chippy-icon.svg?v=3.0.0-dev.85" />
  <link rel="stylesheet" href="style.css?v=3.0.0-dev.85" />
  <!-- DOMPurify is vendored flat (no subfolder). Loaded before the app so the global is ready. -->
  <script src="dompurify.min.js?v=3.0.0-dev.85"></script>
</head>
<body>
  <!-- Top chrome: 36px bar across the viewport (R56). Hardcoded indigo, identical in both themes. -->
  <div id="topChrome" class="top-chrome">
    <div class="tc-left">
      <img class="app-icon" src="chippy-icon.svg?v=3.0.0-dev.85" alt="" />
      <h2>Chippy <span id="appVersion" class="app-version"></span></h2>
    </div>
    <div class="tc-middle">
      <div id="recentBar" class="recent-bar"><!-- recent-discussion tabs (later steps) --></div>
    </div>
    <div class="tc-right">
      <button id="btnPrintChrome" class="chrome-btn hidden" title="Print">🖶</button>
      <button id="btnThemeToggle" class="chrome-btn" title="Toggle light / dark theme">☀</button>
      <button id="btnAbout" class="chrome-btn" title="About Chippy">ℹ</button>
      <button id="btnHelp" class="chrome-btn" title="Help">?</button>
    </div>
  </div>

  <!-- Slim-mode (<800px) region tabs: show one column at a time (R36). Hidden on wide screens. -->
  <div id="slimTabs" class="slim-tabs">
    <button class="slim-tab" data-slim="nav">Navigation</button>
    <button class="slim-tab" data-slim="mid">Discussion</button>
    <button class="slim-tab" data-slim="right">Tasks &amp; Goals</button>
  </div>

  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">Discussions<button id="btnNewDiscussion" class="btn-new-discussion hidden" title="New discussion">+</button></div>
      <div class="sidebar-search-wrap">
        <input id="sidebarSearch" class="sidebar-search" type="text" placeholder="Search discussions…" />
        <button id="sidebarSearchClear" class="search-clear hidden" title="Clear">×</button>
      </div>
      <div class="sidebar-body"><!-- discussion list rendered by pages.js --></div>
      <div class="sidebar-nav">
        <button class="nav-btn" data-screen="allComments">Comments</button>
        <button class="nav-btn" data-screen="allTasks">Tasks</button>
        <button class="nav-btn" data-screen="allGoals">Goals</button>
        <button class="nav-btn" data-screen="allLinks">Links</button>
        <button class="nav-btn" data-screen="allImages">Images</button>
        <button class="nav-btn" data-screen="allNames">Names</button>
        <button class="nav-btn" data-screen="allTags">Tags</button>
        <button class="nav-btn" data-screen="kanban">Kanban</button>
        <button class="nav-btn" data-screen="ro3">Ro3</button>
        <button class="nav-btn" data-screen="activity">Activity</button>
        <button class="nav-btn" data-screen="summary">Summary</button>
      </div>
      <div class="sidebar-footer">
        <button id="btnOpenFolder" class="btn-open-folder" title="Open a local data folder">Open Folder</button>
        <div id="folderStatus" class="folder-status">No folder open</div>
      </div>
    </aside>

    <main id="main">
      <section id="welcomeScreen" class="screen active">
        <div class="welcome">
          <h1>Chippy</h1>
          <p class="welcome-sub">Local notebook for long-running discussions.</p>
          <p class="welcome-hint">Scaffold shell — screens are wired in later implementation steps.</p>
        </div>
      </section>

      <section id="memberScreen" class="screen"><!-- built by discussion.js --></section>
      <section id="allCommentsScreen" class="screen"></section>
      <section id="allTasksScreen" class="screen"></section>
      <section id="allGoalsScreen" class="screen"></section>
      <section id="allLinksScreen" class="screen"></section>
      <section id="allImagesScreen" class="screen"></section>
      <section id="allNamesScreen" class="screen"></section>
      <section id="allTagsScreen" class="screen"></section>
      <section id="kanbanScreen" class="screen"></section>
      <section id="ro3Screen" class="screen"></section>
      <section id="activityScreen" class="screen"></section>
      <section id="summaryScreen" class="screen"></section>
    </main>
  </div>

  <!-- Classic scripts (no ES modules) so the app runs directly from file://.
       Load order matters: each file attaches to the global Chippy namespace,
       and later files depend on earlier ones (io needs format; main needs all). -->
  <script src="format.js?v=3.0.0-dev.85"></script>
  <script src="taxonomy.js?v=3.0.0-dev.85"></script>
  <script src="io.js?v=3.0.0-dev.85"></script>
  <script src="store.js?v=3.0.0-dev.85"></script>
  <script src="ui.js?v=3.0.0-dev.85"></script>
  <script src="discussion.js?v=3.0.0-dev.85"></script>
  <script src="pages.js?v=3.0.0-dev.85"></script>
  <script src="dashboard.js?v=3.0.0-dev.85"></script>
  <script src="main.js?v=3.0.0-dev.85"></script>
</body>
</html>
